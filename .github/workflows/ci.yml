name: ci

on: [push, pull_request]

jobs:
  backend:
    # The deployment target. Bugs in this class of app hide on the wrong OS,
    # so the boundary code must be exercised on Windows from day one.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go vet ./...
      - run: go test ./...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npx biome ci .
      - run: npm run build
      - run: npm test
